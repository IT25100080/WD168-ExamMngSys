<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard – ExamPortal</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Exam<span>Portal</span></div>
        <nav class="sidebar-nav">
            <a href="/pages/student/dashboard.html" class="active"><i class="fas fa-house"></i> Dashboard</a>
            <a href="/pages/student/modules.html"><i class="fas fa-book"></i> Modules</a>
            <a href="/pages/student/exams.html"><i class="fas fa-file-pen"></i> My Exams</a>
            <a href="/pages/student/results.html"><i class="fas fa-chart-bar"></i> My Results</a>
            <a href="/pages/student/concerns.html"><i class="fas fa-comment-dots"></i> Concerns</a>
            <a href="/pages/student/announcements.html"><i class="fas fa-bell"></i> Announcements <span id="notifBadge" style="display:none;background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px">0</span></a>
        </nav>
        <div class="sidebar-bottom">
            <div class="sidebar-user" id="sidebarUser"></div>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-header-text">
                <h1 id="greetingHeading">Welcome back!</h1>
                <p>Here's an overview of your enrolled modules.</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card green">
                <div class="stat-value" id="statEnrolled">—</div>
                <div class="stat-label">Enrolled Modules</div>
            </div>
            <div class="stat-card purple">
                <div class="stat-value" id="statResults">—</div>
                <div class="stat-label">Results Released</div>
            </div>
        </div>

        <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap">
            <a href="/pages/student/modules.html" class="btn btn-primary"><i class="fas fa-book"></i> Browse &amp; Enroll Modules</a>
            <a href="/pages/student/exams.html" class="btn btn-secondary"><i class="fas fa-file-pen"></i> View Exams</a>
            <a href="/pages/student/results.html" class="btn btn-secondary"><i class="fas fa-chart-bar"></i> View Results</a>
        </div>

        <div class="card">
            <div class="card-header"><h2>Enrolled Modules</h2></div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Code</th><th>Module</th><th>Lecturer</th><th></th></tr></thead>
                    <tbody id="enrolledTbody"><tr><td colspan="4"><div class="loading">Loading…</div></td></tr></tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<div id="toast"></div>
<script src="/js/auth.js"></script>
<script src="/js/student.js"></script>
<script>initDashboard();</script>
</body>
</html>

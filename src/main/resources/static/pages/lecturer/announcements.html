<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements – ExamPortal</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Exam<span>Portal</span></div>
        <nav class="sidebar-nav">
            <a href="/pages/lecturer/dashboard.html"><i class="fas fa-house"></i> Dashboard</a>
            <a href="/pages/lecturer/exams.html"><i class="fas fa-file-pen"></i> Exams &amp; Questions</a>
            <a href="/pages/lecturer/results.html"><i class="fas fa-chart-bar"></i> Results &amp; Grading</a>
            <a href="/pages/lecturer/concerns.html"><i class="fas fa-comment-dots"></i> Concerns</a>
            <a href="/pages/lecturer/announcements.html" class="active"><i class="fas fa-bullhorn"></i> Announcements</a>
        </nav>
        <div class="sidebar-bottom">
            <div class="sidebar-user" id="sidebarUser"></div>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-header-text">
                <h1>Announcements</h1>
                <p>Post notices to students enrolled in your modules</p>
            </div>
            <button class="btn btn-primary" onclick="openPostAnnouncementModal()">
                <i class="fas fa-plus"></i> Post Announcement
            </button>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Module</th><th>Title</th><th>Message</th><th>Posted By</th><th>Date</th><th></th></tr>
                    </thead>
                    <tbody id="lecturerAnnouncementsTbody">
                        <tr><td colspan="6"><div class="loading">Loading…</div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Post Announcement Modal -->
<div id="postAnnouncementModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('postAnnouncementModal')">
    <div class="modal">
        <div class="modal-header">
            <h3>Post Announcement</h3>
            <button class="modal-close" onclick="closeModal('postAnnouncementModal')"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Module</label>
                <select id="announcementModuleSel" class="form-control"></select>
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="announcementTitle" class="form-control" placeholder="Announcement title" maxlength="200">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="announcementMessage" class="form-control" rows="5" placeholder="Write your announcement…" style="resize:vertical"></textarea>
            </div>
            <div id="announcementError" class="alert alert-danger hidden"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('postAnnouncementModal')">Cancel</button>
            <button class="btn btn-primary" onclick="submitLecturerAnnouncement()"><i class="fas fa-paper-plane"></i> Post</button>
        </div>
    </div>
</div>

<div id="toast"></div>
<script src="/js/auth.js"></script>
<script src="/js/lecturer.js"></script>
<script>initLecturerAnnouncements();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semesters – ExamPortal</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Exam<span>Portal</span></div>
        <nav class="sidebar-nav">
            <a href="/pages/admin/dashboard.html"><i class="fas fa-house"></i> Dashboard</a>
            <a href="/pages/admin/modules.html"><i class="fas fa-book"></i> Modules</a>
            <a href="/pages/admin/users.html"><i class="fas fa-users"></i> Users</a>
            <a href="/pages/admin/announcements.html"><i class="fas fa-bullhorn"></i> Announcements</a>
        </nav>
        <div class="sidebar-bottom">
            <div class="sidebar-user" id="sidebarUser"></div>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-header-text">
                <h1>Semesters</h1>
                <p>Pre-built semesters per academic year (Semester 1 &amp; Semester 2)</p>
            </div>
        </div>

        <div class="filter-bar">
            <label>Academic Year:</label>
            <select id="yearSelect" class="form-control" onchange="onYearChange()">
                <option value="">-- Select Year --</option>
            </select>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Semester Name</th><th>Display Order</th></tr>
                    </thead>
                    <tbody id="semestersTbody">
                        <tr><td colspan="2" class="text-center text-muted" style="padding:32px">Select a year to view semesters.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="toast"></div>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>initSemesters();</script>
</body>
</html>

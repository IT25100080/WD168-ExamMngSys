<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users – ExamPortal</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Exam<span>Portal</span></div>
        <nav class="sidebar-nav">
            <a href="/pages/admin/dashboard.html"><i class="fas fa-house"></i> Dashboard</a>
            <a href="/pages/admin/modules.html"><i class="fas fa-book"></i> Modules</a>
            <a href="/pages/admin/users.html" class="active"><i class="fas fa-users"></i> Users</a>
        </nav>
        <div class="sidebar-bottom">
            <div class="sidebar-user" id="sidebarUser"></div>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-header-text">
                <h1>Users</h1>
                <p>Manage system users and roles</p>
            </div>
            <button class="btn btn-primary" onclick="showCreateUserModal()">+ Create User</button>
        </div>

        <div class="filter-bar">
            <input type="text" id="userSearch" class="form-control" placeholder="Search name, username, email…" oninput="filterUsers()" style="max-width:260px">
            <select id="roleFilter" class="form-control" onchange="filterUsers()" style="max-width:160px">
                <option value="">All Roles</option>
                <option value="ADMIN">Admin</option>
                <option value="LECTURER">Lecturer</option>
                <option value="STUDENT">Student</option>
            </select>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Full Name</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="usersTbody">
                        <tr><td colspan="5"><div class="loading">Loading...</div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Create User Modal -->
<div class="modal-overlay hidden" id="userModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Create User</h3>
            <button class="modal-close" onclick="closeModal('userModal')"><i class="fas fa-xmark"></i></button>
        </div>
        <form id="userForm" onsubmit="event.preventDefault();saveUser()">
            <div class="modal-body">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="uFullName" class="form-control" placeholder="Full name">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Username <span style="color:red">*</span></label>
                        <input type="text" id="uUsername" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <label>Role <span style="color:red">*</span></label>
                        <select id="uRole" class="form-control" required>
                            <option value="">-- Select Role --</option>
                            <option value="ADMIN">Admin</option>
                            <option value="LECTURER">Lecturer</option>
                            <option value="STUDENT">Student</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email <span style="color:red">*</span></label>
                    <input type="email" id="uEmail" class="form-control" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <label>Password <span style="color:red">*</span></label>
                    <input type="password" id="uPassword" class="form-control" placeholder="Initial password" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('userModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Create User</button>
            </div>
        </form>
    </div>
</div>

<!-- Enrollments Modal -->
<div class="modal-overlay hidden" id="enrollmentsModal">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3>Module Enrollments — <span id="enrollmentsStudentName"></span></h3>
            <button class="modal-close" onclick="closeModal('enrollmentsModal')"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <div id="enrollmentsList"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('enrollmentsModal')">Close</button>
        </div>
    </div>
</div>

<!-- Reset Password Modal -->
<div class="modal-overlay hidden" id="resetPwdModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Reset Password — <span id="resetPwdUsername"></span></h3>
            <button class="modal-close" onclick="closeModal('resetPwdModal')"><i class="fas fa-xmark"></i></button>
        </div>
        <form id="resetPwdForm" onsubmit="event.preventDefault();doResetPassword()">
            <div class="modal-body">
                <div class="form-group">
                    <label>New Password <span style="color:red">*</span></label>
                    <input type="password" id="rpNewPassword" class="form-control" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password <span style="color:red">*</span></label>
                    <input type="password" id="rpConfirmPassword" class="form-control" placeholder="Confirm new password" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('resetPwdModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Reset Password</button>
            </div>
        </form>
    </div>
</div>

<div id="toast"></div>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>initUsers();</script>
</body>
</html>

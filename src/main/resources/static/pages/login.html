<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ExamPortal</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <h1><i class="fas fa-graduation-cap"></i> ExamPortal</h1>
            <p>Online Examination &amp; Result Management</p>
        </div>

        <div class="login-tabs">
            <button class="login-tab active" onclick="showTab('login')">Sign In</button>
            <button class="login-tab" onclick="showTab('register')">Register</button>
        </div>

        <div id="loginAlert" class="alert hidden"></div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" class="form-control" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
            </div>
            <button class="btn btn-primary w-full" onclick="login()">Sign In</button>
            <p class="text-center" style="margin-top:12px">
                <button type="button" style="background:none;border:none;color:#2563eb;cursor:pointer;font-size:13px;padding:0;text-decoration:underline" onclick="showForgotModal()">Forgot Password?</button>
            </p>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regFullName" class="form-control" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Username <span style="color:red">*</span></label>
                <input type="text" id="regUsername" class="form-control" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Email <span style="color:red">*</span></label>
                <input type="email" id="regEmail" class="form-control" placeholder="Your email address">
            </div>
            <div class="form-group">
                <label>Password <span style="color:red">*</span></label>
                <input type="password" id="regPassword" class="form-control" placeholder="Create a password">
            </div>
            <button class="btn btn-primary w-full" onclick="register()">Create Account</button>
            <p class="text-muted text-center" style="margin-top:10px;font-size:12px">
                Student accounts only. Lecturers are created by admin.
            </p>
        </div>
    </div>
</div>
<!-- Forgot Password Modal -->
<div class="modal-overlay hidden" id="forgotModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Request Password Reset</h3>
            <button class="modal-close" onclick="closeModal('forgotModal')"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <p style="font-size:14px;color:#64748b;margin-bottom:16px">
                Enter your username or email. An administrator will reset your password and provide you with the new one.
            </p>
            <div class="form-group">
                <label>Username or Email <span style="color:red">*</span></label>
                <input type="text" id="forgotIdentifier" class="form-control" placeholder="Enter your username or email">
            </div>
            <div id="forgotAlert" class="alert hidden" style="margin-top:12px"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('forgotModal')">Cancel</button>
            <button class="btn btn-primary" onclick="submitForgotPassword()">Submit Request</button>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>

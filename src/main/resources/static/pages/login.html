<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ExamPortal</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <h1><i class="fas fa-graduation-cap"></i> ExamPortal</h1>
            <p>Online Examination &amp; Result Management</p>
        </div>

        <div class="login-tabs">
            <button class="login-tab active" onclick="showTab('login')">Sign In</button>
            <button class="login-tab" onclick="showTab('register')">Register</button>
        </div>

        <div id="loginAlert" class="alert hidden"></div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" class="form-control" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
            </div>
            <button class="btn btn-primary w-full" onclick="login()">Sign In</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regFullName" class="form-control" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Username <span style="color:red">*</span></label>
                <input type="text" id="regUsername" class="form-control" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Email <span style="color:red">*</span></label>
                <input type="email" id="regEmail" class="form-control" placeholder="Your email address">
            </div>
            <div class="form-group">
                <label>Password <span style="color:red">*</span></label>
                <input type="password" id="regPassword" class="form-control" placeholder="Create a password">
            </div>
            <button class="btn btn-primary w-full" onclick="register()">Create Account</button>
            <p class="text-muted text-center" style="margin-top:10px;font-size:12px">
                Student accounts only. Lecturers are created by admin.
            </p>
        </div>
    </div>
</div>
<script src="/js/auth.js"></script>
</body>
</html>
